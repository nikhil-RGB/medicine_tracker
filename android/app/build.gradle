plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace "com.example.medicine_reminders_app"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        // Required by flutter_local_notifications (uses java.time via desugaring).
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId "com.example.medicine_reminders_app"
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        // Raised from the Flutter default: core library desugaring +
        // flutter_local_notifications require minSdk 21 (which also auto-enables
        // multidex). multiDexEnabled is set explicitly as a belt-and-suspenders.
        minSdkVersion 21
        multiDexEnabled true
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig signingConfigs.debug
        }
    }

    lint {
        // The release "lintVital" task crashes inside D8BackportedMethodsGenerator
        // when core library desugaring is enabled on this toolchain
        // (AGP 7.3.0 + desugar_jdk_libs 2.0.4). Lint is static analysis only and
        // has no effect on the built APK, so we skip it for release builds.
        checkReleaseBuilds false
    }
}

flutter {
    source '../..'
}

dependencies {
    // 1.2.x is the desugar line compatible with AGP 7.3.0's R8/D8. The 2.0.x
    // series requires AGP 7.4+ and makes this toolchain's R8 fail with
    // "This is not a JSON Array". 1.2.2 still backports the java.time APIs
    // flutter_local_notifications relies on.
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:1.2.2"

    // Pin androidx.window to 1.0.0. The Flutter embedding pulls a newer version
    // whose ExtensionWindowLayoutInfoBackend calls addWindowLayoutInfoListener
    // (Activity, Consumer) — a method missing from the older window.extensions
    // stub on some emulator images, causing a NoSuchMethodError crash at launch.
    implementation "androidx.window:window:1.0.0"
    implementation "androidx.window:window-java:1.0.0"
}
